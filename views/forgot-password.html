<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Mohit Kushwaha</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar scrolled">
  <div class="navbar-inner">
    <a href="/" class="nav-logo">Mohit <span>Kushwaha</span></a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:2.5rem;margin-bottom:12px">🔑</div>
      <h2>Forgot Password?</h2>
      <p>Enter your email and we'll help you get back in</p>
    </div>

    <form id="forgot-form" novalidate>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
        <div class="form-error" id="email-error"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Send Reset Link</button>
    </form>

    <div id="forgot-success" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:2.5rem;margin-bottom:12px">✉️</div>
      <h3 style="font-family:'Playfair Display',serif;margin-bottom:10px">Check Your Info</h3>
      <p style="font-size:0.88rem;color:#666;line-height:1.65">If this email is registered, a reset link has been sent.<br><br>For immediate help, please contact us on Instagram: <a href="https://instagram.com/mohitkushwaha" style="color:#c9a96e;font-weight:500" target="_blank">@mohitkushwaha</a></p>
    </div>

    <div class="auth-footer">
      <a href="/login">← Back to Login</a>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="/js/auth.js"></script>
</body>
</html>
