<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Mohit Kushwaha</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar scrolled">
  <div class="navbar-inner">
    <a href="/" class="nav-logo">Mohit <span>Kushwaha</span></a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h2>Create Account</h2>
      <p>Join thousands of readers today</p>
    </div>

    <form id="signup-form" novalidate>
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" class="form-control" id="name" placeholder="Your full name" autocomplete="name" required>
        <div class="form-error" id="name-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address *</label>
        <input type="email" class="form-control" id="email" placeholder="your@email.com" autocomplete="email" required>
        <div class="form-error" id="email-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Instagram Username <span style="color:#bbb;font-weight:400">(optional)</span></label>
        <input type="text" class="form-control" id="instagram" placeholder="@yourusername">
      </div>

      <div class="form-group">
        <label class="form-label">Password *</label>
        <div style="position:relative">
          <input type="password" class="form-control" id="password" placeholder="Min 6 characters" autocomplete="new-password" required style="padding-right:44px">
          <button type="button" id="toggle-pw" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:1rem">👁</button>
        </div>
        <div class="form-error" id="password-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password *</label>
        <input type="password" class="form-control" id="confirm-password" placeholder="Re-enter your password" required>
        <div class="form-error" id="confirm-error"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Login</a>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="/js/auth.js"></script>
<script>
document.getElementById('toggle-pw').addEventListener('click', function() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  this.textContent = pw.type === 'password' ? '👁' : '🙈';
});
</script>
</body>
</html>
