<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Mohit Kushwaha</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar scrolled">
  <div class="navbar-inner">
    <a href="/" class="nav-logo">Mohit <span>Kushwaha</span></a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h2>Welcome Back</h2>
      <p>Login to access your personal library</p>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="your@email.com" autocomplete="email" required>
        <div class="form-error" id="email-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password" style="display:flex;justify-content:space-between">
          Password
          <a href="/forgot-password" style="font-size:0.82rem;color:#c9a96e;font-weight:400">Forgot password?</a>
        </label>
        <div style="position:relative">
          <input type="password" class="form-control" id="password" placeholder="Enter your password" autocomplete="current-password" required style="padding-right:44px">
          <button type="button" id="toggle-pw" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:1rem" title="Show/hide password">👁</button>
        </div>
        <div class="form-error" id="password-error"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">Login</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/signup">Sign Up</a>
    </div>

    <div style="margin-top:20px;padding:14px;background:#f8f8f8;border-radius:10px;font-size:0.8rem;color:#888;text-align:center">
      <strong>Admin?</strong> Use <code style="color:#c9a96e">admin@mohitkushwaha.com</code>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="/js/auth.js"></script>
<script>
document.getElementById('toggle-pw').addEventListener('click', function() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  this.textContent = pw.type === 'password' ? '👁' : '🙈';
});
</script>
</body>
</html>
